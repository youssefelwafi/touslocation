# aaPanel — URL Rewrite (Pseudo-static) pour dev.ameaengi.com
# A coller dans : Site > Configuration > URL Rewrite (伪静态)
#
# Prerequis (approche aaPanel native) :
#   - Racine du site = /www/wwwroot/dev.ameaengi.com/backend/public
#   - Copier le build React dans public :  cp -r frontend/dist/* backend/public/
#   - php artisan storage:link
#
# API Laravel sous /api ; le reste = application React (SPA).

location /api {
    try_files $uri $uri/ /index.php?$query_string;
}

location /sanctum {
    try_files $uri $uri/ /index.php?$query_string;
}

location / {
    try_files $uri $uri/ /index.html;
}
